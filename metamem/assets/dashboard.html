<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MetaMem Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --panel: #1a1d27; --border: #2a2e3a;
    --text: #e4e7ef; --muted: #8b90a0; --accent: #ec4899; --accent2: #6366f1;
    --ok: #34d399; --warn: #fbbf24;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { padding: 20px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; margin: 0; }
  header .brand { color: var(--accent); }
  select { background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; margin-left: auto; }
  main { padding: 24px 28px; max-width: 1200px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .card .value { font-size: 24px; font-weight: 600; margin-top: 6px; }
  section { margin-top: 28px; }
  section h2 { font-size: 15px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .05em; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-size: 12px; text-transform: uppercase; }
  tr:last-child td { border-bottom: none; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px;
    background: rgba(99,102,241,.18); color: #a5b4fc; }
  .pill.episodic { background: rgba(52,211,153,.18); color: #6ee7b7; }
  .pill.semantic { background: rgba(99,102,241,.18); color: #a5b4fc; }
  .pill.procedural { background: rgba(236,72,153,.18); color: #f9a8d4; }
  .pill.failure { background: rgba(248,113,113,.18); color: #fca5a5; }
  .pill.instruction { background: rgba(251,191,36,.18); color: #fcd34d; }
  .conf { color: var(--muted); font-variant-numeric: tabular-nums; }
  .bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; }
  .bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .muted { color: var(--muted); }
  .empty { color: var(--muted); padding: 24px; text-align: center; }
</style>
</head>
<body>
<header>
  <span class="brand">🧠</span>
  <h1>MetaMem <span class="muted">Dashboard</span></h1>
  <select id="project"><option value="">All projects</option></select>
</header>
<main>
  <div class="cards" id="stat-cards"></div>

  <section>
    <h2>Token Usage</h2>
    <div class="cards" id="usage-cards"></div>
    <div id="usage-by-project" style="margin-top:16px"></div>
  </section>

  <section>
    <h2>Memory Efficiency</h2>
    <div class="cards" id="hits-cards"></div>
    <div id="hits-by-project" style="margin-top:16px"></div>
  </section>

  <section>
    <h2>Memories</h2>
    <div id="memories"></div>
  </section>
</main>

<script>
const $ = (sel) => document.querySelector(sel);

async function getJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(url + " -> " + r.status);
  return r.json();
}

function card(label, value) {
  return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div></div>`;
}

function fmt(n) { return (n || 0).toLocaleString(); }

async function loadProjects() {
  const data = await getJSON("/api/projects");
  const sel = $("#project");
  for (const p of data.projects) {
    const opt = document.createElement("option");
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  }
}

async function loadStats(project) {
  const q = project ? `?project=${encodeURIComponent(project)}` : "";
  const data = await getJSON("/api/stats" + q);
  const s = data.store || {};
  $("#stat-cards").innerHTML =
    card("Total memories", fmt(s.total)) +
    card("Active", fmt(s.active)) +
    card("Avg confidence", (s.avg_confidence ?? 0)) +
    card("Embeddings", fmt(s.embeddings)) +
    card("Evolution actions", fmt((data.evolution || {}).total_actions));
}

async function loadUsage(project) {
  const q = project ? `?project=${encodeURIComponent(project)}` : "";
  const data = await getJSON("/api/usage" + q);
  const t = data.totals || {};
  $("#usage-cards").innerHTML =
    card("Turns tracked", fmt(data.turns)) +
    card("Input tokens", fmt(t.input_tokens)) +
    card("Output tokens", fmt(t.output_tokens)) +
    card("Cache read", fmt(t.cache_read_input_tokens)) +
    card("Cache hit ratio", ((data.cache_hit_ratio || 0) * 100).toFixed(1) + "%");

  const byProj = data.by_project || {};
  const projects = Object.keys(byProj);
  if (!projects.length) {
    $("#usage-by-project").innerHTML = '<div class="empty">No token usage recorded yet.</div>';
    return;
  }
  const max = Math.max(...projects.map(p => byProj[p].input_tokens + byProj[p].output_tokens), 1);
  let rows = projects.map(p => {
    const tot = byProj[p].input_tokens + byProj[p].output_tokens;
    const pct = (tot / max * 100).toFixed(1);
    return `<tr><td>${p}</td><td>${fmt(byProj[p].turns)}</td>
      <td>${fmt(byProj[p].input_tokens)}</td><td>${fmt(byProj[p].output_tokens)}</td>
      <td style="width:30%"><div class="bar"><span style="width:${pct}%"></span></div></td></tr>`;
  }).join("");
  $("#usage-by-project").innerHTML =
    `<table><thead><tr><th>Project</th><th>Turns</th><th>Input</th><th>Output</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`;
}

async function loadMemoryHits(project) {
  const q = project ? `?project=${encodeURIComponent(project)}` : "";
  const data = await getJSON("/api/memory-hits" + q);
  const t = data.totals || {};
  const hitRate = t.memory_hits > 0
    ? ((t.memory_hits / (data.sessions || 1)).toFixed(1) + " hits/session")
    : "—";
  $("#hits-cards").innerHTML =
    card("Sessions tracked", fmt(data.sessions)) +
    card("Memories loaded", fmt(t.memories_loaded)) +
    card("Memory hits", fmt(t.memory_hits)) +
    card("Memories distilled", fmt(t.memories_distilled)) +
    card("Avg hits/session", hitRate);

  const byProj = data.by_project || {};
  const projects = Object.keys(byProj);
  if (!projects.length) {
    $("#hits-by-project").innerHTML = '<div class="empty">No memory hit data yet — recorded at session end after distillation.</div>';
    return;
  }
  let rows = projects.map(p => {
    const d = byProj[p];
    return `<tr><td>${p}</td><td>${fmt(d.sessions)}</td>
      <td>${fmt(d.memories_loaded)}</td><td>${fmt(d.memory_hits)}</td>
      <td>${fmt(d.memories_distilled)}</td></tr>`;
  }).join("");
  $("#hits-by-project").innerHTML =
    `<table><thead><tr><th>Project</th><th>Sessions</th><th>Loaded</th><th>Hits</th><th>Distilled</th></tr></thead><tbody>${rows}</tbody></table>`;
}

async function loadMemories(project) {
  const q = project ? `?project=${encodeURIComponent(project)}` : "";
  const data = await getJSON("/api/memories" + q);
  const mems = data.memories || [];
  if (!mems.length) {
    $("#memories").innerHTML = '<div class="empty">No memories stored yet.</div>';
    return;
  }
  let rows = mems.map(m => `<tr>
    <td><span class="pill ${m.type}">${m.type}</span></td>
    <td>${(m.summary || "").replace(/</g, "&lt;")}</td>
    <td class="conf">${(m.confidence ?? 0).toFixed(2)}</td>
  </tr>`).join("");
  $("#memories").innerHTML =
    `<table><thead><tr><th>Type</th><th>Summary</th><th>Conf</th></tr></thead><tbody>${rows}</tbody></table>`;
}

async function refresh() {
  const project = $("#project").value;
  try {
    await Promise.all([loadStats(project), loadUsage(project), loadMemoryHits(project), loadMemories(project)]);
  } catch (e) {
    console.error(e);
  }
}

$("#project").addEventListener("change", refresh);

(async () => {
  await loadProjects();
  await refresh();
})();
</script>
</body>
</html>
